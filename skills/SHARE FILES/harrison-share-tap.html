<div class="section-label">Share</div>

<div class="card glass" style="border-radius:20px;">

  <div style="padding:14px 16px 4px;position:relative;z-index:2;">
    <div style="font-size:15px;font-weight:800;color:#fff;margin-bottom:3px;">
      Know a local business owner?
    </div>
    <div style="font-size:12px;color:rgba(255,255,255,.48);line-height:1.5;">
      Send them this — one tap, pre-filled and ready to go.
    </div>
  </div>

  <!-- Text / iMessage — short version -->
  <button onclick="shareHarrisonShort()" class="tap-row">
    <div class="row-icon" style="background:rgba(0,122,255,.22);border:1px solid rgba(0,122,255,.2);backdrop-filter:blur(8px);box-shadow:inset 0 1px 0 rgba(255,255,255,.18);">
      💬
    </div>
    <div class="row-text">
      <div class="row-title">Text a Friend</div>
      <div class="row-sub">Short · Personal · Pre-filled</div>
    </div>
    <div class="row-arrow">›</div>
  </button>

  <!-- Facebook — medium version -->
  <button onclick="shareHarrisonFacebook()" class="tap-row">
    <div class="row-icon" style="background:rgba(24,119,242,.22);border:1px solid rgba(24,119,242,.2);backdrop-filter:blur(8px);box-shadow:inset 0 1px 0 rgba(255,255,255,.18);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2">
        <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047v-2.66c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.971h-1.513c-1.491 0-1.956.931-1.956 1.886v2.264h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
      </svg>
    </div>
    <div class="row-text">
      <div class="row-title">Share on Facebook</div>
      <div class="row-sub">Longer · For a post or message</div>
    </div>
    <div class="row-arrow">›</div>
  </button>

</div>

<script>
/* ── HARRISON REFERRAL COPY ── */
const H = {
  url:   'https://www.501.marketing',
  phone: '(501) 772-8275',

  /* Approved short — Text / iMessage */
  short: 'Hey, thought of you — there\'s a local guy named Harrison doing websites, reviews, payments and even an AI that answers your business calls. Might be worth a look. Feel free to reach out to him directly: www.501.marketing or call/text (501) 772-8275',

  /* Approved medium — Facebook */
  medium: 'If you\'re in Central Arkansas and tired of wasting money on the wrong people — this is worth your time. A local guy named Harrison builds the whole digital setup for small businesses around here. Website, Google reviews, payments, even an AI that handles your business calls. He\'s local, easy to reach, and actually delivers. Check him out: www.501.marketing or call/text (501) 772-8275'
};

/* Text / iMessage — short, personal, room to add on */
async function shareHarrisonShort() {
  if (navigator.share) {
    try {
      await navigator.share({
        title: '501 Digital Marketing',
        text:  H.short,
        url:   H.url
      });
    } catch(e) {}
  } else {
    try {
      await navigator.clipboard.writeText(H.short + '\n' + H.url);
      alert('Copied! Paste into a text or message.');
    } catch(e) { alert(H.short + '\n' + H.url); }
  }
}

/* Facebook — medium, more context */
async function shareHarrisonFacebook() {
  /* Try native share first (mobile).
     On desktop opens FB sharer with URL pre-loaded. */
  if (navigator.share) {
    try {
      await navigator.share({
        title: '501 Digital Marketing',
        text:  H.medium,
        url:   H.url
      });
    } catch(e) {}
  } else {
    /* Desktop: open FB share dialog with URL */
    const fbUrl = 'https://www.facebook.com/sharer/sharer.php?u='
                + encodeURIComponent(H.url);
    window.open(fbUrl, '_blank');
  }
}
</script>
